service: defendershield-etl
schedule: "15 11 * * *"
stages:
  - name: etl-pipeline
    type: docker-exec
    container: etl-scheduler
    command: "python -m defendershield_etl.pipelines.daily_runner --catchup"
    timeout: 3600
  - name: auditor
    type: agent
    role: auditor
    depends_on: [etl-pipeline]
    max_turns: 25
    timeout: 600
  - name: weekly-report
    type: docker-exec
    container: etl-scheduler
    command: "python -m defendershield_etl.reports.weekly"
    depends_on: [auditor]
    condition: etl-pipeline.success
    when: [mon]
    timeout: 120
  - name: monthly-report
    type: docker-exec
    container: etl-scheduler
    command: "python -m defendershield_etl.reports.monthly"
    depends_on: [auditor]
    condition: etl-pipeline.success
    when_day_of_month: [1]
    timeout: 120
  - name: new-product-report
    type: docker-exec
    container: etl-scheduler
    command: "python -m defendershield_etl.reports.new_product_performance"
    depends_on: [auditor]
    condition: etl-pipeline.success
    timeout: 120
